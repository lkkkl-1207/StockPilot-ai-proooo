<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>StockPilot AI Pro</title>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Arial, "Microsoft YaHei", sans-serif;
      color: #eef4ff;
      background:
        radial-gradient(circle at top right, #19366f 0, transparent 35%),
        linear-gradient(135deg, #07101f, #0c1930);
    }

    .container {
      width: min(1150px, 92%);
      margin: 0 auto;
      padding: 42px 0 80px;
    }

    header {
      margin-bottom: 30px;
    }

    h1 {
      margin: 0 0 8px;
      font-size: 38px;
    }

    .subtitle {
      margin: 0;
      color: #9eb0ca;
    }

    .search-card,
    .summary-card,
    .ai-card {
      padding: 24px;
      border: 1px solid #294467;
      border-radius: 20px;
      background: rgba(15, 29, 52, 0.92);
      box-shadow: 0 20px 50px rgba(0, 0, 0, 0.25);
    }

    .search-row {
      display: flex;
      gap: 12px;
    }

    input {
      flex: 1;
      min-width: 0;
      padding: 15px 17px;
      color: white;
      font-size: 16px;
      text-transform: uppercase;
      background: #091627;
      border: 1px solid #36577f;
      border-radius: 12px;
      outline: none;
    }

    input:focus {
      border-color: #8192ff;
    }

    button {
      padding: 14px 22px;
      color: white;
      font-weight: bold;
      font-size: 15px;
      background: #6678ff;
      border: 0;
      border-radius: 12px;
      cursor: pointer;
    }

    button:disabled {
      cursor: wait;
      opacity: 0.65;
    }

    .examples {
      margin-top: 13px;
      color: #8194b1;
      font-size: 14px;
    }

    .status {
      display: none;
      margin-top: 18px;
      padding: 14px;
      border-radius: 12px;
      line-height: 1.6;
    }

    .loading {
      display: block;
      color: #bdd0ff;
      background: #142846;
    }

    .error {
      display: block;
      color: #ffd1d1;
      background: #4a1c28;
    }

    #resultArea {
      display: none;
      margin-top: 22px;
    }

    .report-header {
      display: flex;
      justify-content: space-between;
      gap: 20px;
      align-items: flex-start;
      margin-bottom: 20px;
    }

    .symbol {
      margin: 0;
      font-size: 33px;
    }

    .rating {
      display: inline-block;
      margin-top: 8px;
      padding: 7px 12px;
      font-size: 14px;
      border-radius: 999px;
      background: #263b62;
      color: #d9e4ff;
    }

    .score-box {
      min-width: 130px;
      padding: 16px;
      text-align: center;
      border-radius: 16px;
      background: #10213b;
    }

    .score-number {
      display: block;
      font-size: 34px;
      font-weight: bold;
      color: #8fa2ff;
    }

    .score-label {
      color: #9eb0ca;
      font-size: 13px;
    }

    .price-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 14px;
    }

    .price-item {
      padding: 18px;
      border-radius: 16px;
      background: #0b192d;
      border: 1px solid #233e61;
    }

    .price-label {
      margin-bottom: 8px;
      color: #8fa2bd;
      font-size: 13px;
    }

    .price-value {
      font-size: 22px;
      font-weight: bold;
      color: white;
    }

    .buy-value {
      color: #6ce0a0;
    }

    .risk-value {
      color: #ff8e8e;
    }

    .target-value {
      color: #8fb7ff;
    }

    .action-box {
      margin-top: 18px;
      padding: 16px;
      line-height: 1.7;
      color: #d9e4f5;
      border-radius: 14px;
      background: #13243e;
    }

    .signals-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
      margin-top: 18px;
    }

    .signal-box {
      padding: 18px;
      border-radius: 16px;
      background: #0b192d;
      border: 1px solid #233e61;
    }

    .signal-box h3 {
      margin-top: 0;
    }

    .signal-box ul {
      margin: 0;
      padding-left: 20px;
      line-height: 1.8;
      color: #c9d6e8;
    }

    .ai-card {
      margin-top: 20px;
    }

    .ai-card h2 {
      margin-top: 0;
    }

    .provider {
      display: inline-block;
      margin-bottom: 18px;
      padding: 6px 10px;
      color: #b9c9e3;
      font-size: 13px;
      background: #10213b;
      border-radius: 999px;
    }

    .ai-report {
      white-space: pre-wrap;
      line-height: 1.9;
      font-size: 16px;
      color: #e3ebf7;
    }

    .notice {
      margin-top: 25px;
      padding: 14px;
      color: #c6b991;
      font-size: 13px;
      line-height: 1.6;
      background: #292514;
      border-radius: 12px;
    }

    @media (max-width: 850px) {
      .price-grid {
        grid-template-columns: 1fr 1fr;
      }
    }

    @media (max-width: 650px) {
      .search-row {
        flex-direction: column;
      }

      h1 {
        font-size: 30px;
      }

      .report-header {
        flex-direction: column;
      }

      .price-grid,
      .signals-grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>

<body>
  <main class="container">
    <header>
      <h1>StockPilot AI Pro</h1>
      <p class="subtitle">
        AI 美股研究、买入观察区间与风险分析工作台
      </p >
    </header>

    <section class="search-card">
      <h2>分析一只股票</h2>

      <div class="search-row">
        <input
          id="symbolInput"
          type="text"
          value="NVDA"
          maxlength="12"
          placeholder="输入股票代码，例如 NVDA"
        />

        <button id="analyzeButton">
          生成完整报告
        </button>
      </div>

      <div class="examples">
        示例：NVDA、AAPL、MSFT、AMD、TSLA、PLTR
      </div>

      <div id="statusBox" class="status"></div>
    </section>

    <section id="resultArea">
      <section class="summary-card">
        <div class="report-header">
          <div>
            <p class="subtitle">股票价格决策报告</p >
            <h2 id="reportSymbol" class="symbol">--</h2>
            <div id="ratingLabel" class="rating">--</div>
          </div>

          <div class="score-box">
            <span id="technicalScore" class="score-number">--</span>
            <span class="score-label">技术评分 / 100</span>
          </div>
        </div>

        <div class="price-grid">
          <div class="price-item">
            <div class="price-label">当前价格</div>
            <div id="currentPrice" class="price-value">$--</div>
          </div>

          <div class="price-item">
            <div class="price-label">买入观察区间</div>
            <div id="buyZone" class="price-value buy-value">
              $-- 至 $--
            </div>
          </div>

          <div class="price-item">
            <div class="price-label">参考建仓价</div>
            <div id="referenceEntry" class="price-value buy-value">
              $--
            </div>
          </div>

          <div class="price-item">
            <div class="price-label">风险参考价</div>
            <div id="riskReference" class="price-value risk-value">
              $--
            </div>
          </div>

          <div class="price-item">
            <div class="price-label">第一止盈目标</div>
            <div id="firstTarget" class="price-value target-value">
              $--
            </div>
          </div>

          <div class="price-item">
            <div class="price-label">第二止盈目标</div>
            <div id="secondTarget" class="price-value target-value">
              $--
            </div>
          </div>

          <div class="price-item">
            <div class="price-label">第一目标风险收益比</div>
            <div id="riskReward" class="price-value">
              --
            </div>
          </div>

          <div class="price-item">
            <div class="price-label">当日涨跌</div>
            <div id="dailyChange" class="price-value">
              --%
            </div>
          </div>

          <div class="price-item">
            <div class="price-label">历史数据来源</div>
            <div id="dataSource" class="price-value">
              --
            </div>
          </div>
        </div>

        <div id="actionBox" class="action-box"></div>

        <div class="signals-grid">
          <div class="signal-box">
            <h3>正面技术信号</h3>
            <ul id="positiveSignals"></ul>
          </div>

          <div class="signal-box">
            <h3>主要风险信号</h3>
            <ul id="riskSignals"></ul>
          </div>
        </div>

        <div id="decisionNotice" class="notice"></div>
      </section>

      <section class="ai-card">
        <h2>AI 综合研究报告</h2>

        <div id="providerLabel" class="provider"></div>

        <div id="aiReport" class="ai-report"></div>

        <div id="aiNotice" class="notice"></div>
      </section>
    </section>
  </main>

  <script>
    const input = document.getElementById("symbolInput");
    const button = document.getElementById("analyzeButton");
    const statusBox = document.getElementById("statusBox");
    const resultArea = document.getElementById("resultArea");

    button.addEventListener("click", analyzeStock);

    input.addEventListener("keydown", function (event) {
      if (event.key === "Enter") {
        analyzeStock();
      }
    });

    function formatMoney(value) {
      const number = Number(value);

      if (!Number.isFinite(number)) {
        return "$--";
      }

      return `$${number.toFixed(2)}`;
    }

    function renderList(elementId, items, emptyMessage) {
      const list = document.getElementById(elementId);
      list.innerHTML = "";

      if (!Array.isArray(items) || items.length === 0) {
        const item = document.createElement("li");
        item.textContent = emptyMessage;
        list.appendChild(item);
        return;
      }

      items.forEach(function (text) {
        const item = document.createElement("li");
        item.textContent = text;
        list.appendChild(item);
      });
    }

    async function readJsonResponse(response) {
      let data;

      try {
        data = await response.json();
      } catch {
        throw new Error("服务器返回了无法读取的数据。");
      }

      if (!response.ok) {
        throw new Error(
          data.detail ||
          `请求失败，错误代码：${response.status}`
        );
      }

      return data;
    }

    async function analyzeStock() {
      const symbol = input.value.trim().toUpperCase();

      if (!symbol) {
        showStatus("请输入股票代码。", "error");
        return;
      }

      button.disabled = true;
      button.textContent = "AI 正在分析…";

      resultArea.style.display = "none";

      showStatus(
        "正在获取实时股价、历史行情、技术指标、新闻并生成 AI 报告，请稍候……",
        "loading"
      );

      try {
        const [quoteResponse, decisionResponse, aiResponse] =
          await Promise.all([
            fetch(`/quote/${encodeURIComponent(symbol)}`),
            fetch(`/decision/${encodeURIComponent(symbol)}`),
            fetch(`/ai-research/${encodeURIComponent(symbol)}`)
          ]);

        const quote = await readJsonResponse(quoteResponse);
        const decision = await readJsonResponse(decisionResponse);
        const ai = await readJsonResponse(aiResponse);

        const plan = decision.suggested_plan || {};
        const buyZone = plan.buy_watch_zone || {};

        document.getElementById("reportSymbol").textContent =
          decision.symbol || symbol;

        document.getElementById("ratingLabel").textContent =
          decision.rating || "暂无评级";

        document.getElementById("technicalScore").textContent =
          decision.technical_score ?? "--";

        document.getElementById("currentPrice").textContent =
          formatMoney(
            quote.current_price ?? decision.current_price
          );

        document.getElementById("buyZone").textContent =
          `${formatMoney(buyZone.low)} 至 ${formatMoney(buyZone.high)}`;

        document.getElementById("referenceEntry").textContent =
          formatMoney(plan.reference_entry);

        document.getElementById("riskReference").textContent =
          formatMoney(plan.risk_reference);

        document.getElementById("firstTarget").textContent =
          formatMoney(plan.first_take_profit);

        document.getElementById("secondTarget").textContent =
          formatMoney(plan.second_take_profit);

        document.getElementById("riskReward").textContent =
          Number.isFinite(
            Number(plan.risk_reward_ratio_to_first_target)
          )
            ? Number(
                plan.risk_reward_ratio_to_first_target
              ).toFixed(2)
            : "--";

        const dailyChange =
          quote.change_percent ??
          decision.daily_change_percent;

        document.getElementById("dailyChange").textContent =
          Number.isFinite(Number(dailyChange))
            ? `${Number(dailyChange).toFixed(2)}%`
            : "--%";

        document.getElementById("dataSource").textContent =
          decision.data_source || "--";

        document.getElementById("actionBox").textContent =
          `${decision.action || ""} ${
            decision.price_status || ""
          }`.trim();

        renderList(
          "positiveSignals",
          decision.positive_signals,
          "暂时没有明显正面技术信号。"
        );

        renderList(
          "riskSignals",
          decision.risk_signals,
          "暂时没有明显风险信号。"
        );

        document.getElementById("decisionNotice").textContent =
          decision.important_notice || "";

        document.getElementById("providerLabel").textContent =
          `${ai.provider || "AI"} · ${ai.model || "未知模型"}`;

        document.getElementById("aiReport").textContent =
          ai.ai_report || "AI 暂时没有返回报告。";

        document.getElementById("aiNotice").textContent =
          ai.important_notice || "";

        statusBox.style.display = "none";
        resultArea.style.display = "block";

        resultArea.scrollIntoView({
          behavior: "smooth",
          block: "start"
        });

      } catch (error) {
        showStatus(
          error.message || "分析失败，请稍后重试。",
          "error"
        );
      } finally {
        button.disabled = false;
        button.textContent = "生成完整报告";
      }
    }

    function showStatus(message, type) {
      statusBox.textContent = message;
      statusBox.className = `status ${type}`;
    }
  </script>
</body>
</html>
