name: StockPilot Closing Review

on:
  workflow_dispatch:

  schedule:
    - cron: "15 20 * * 1-5"

jobs:
  closing-review:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: backend

    env:
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}

    steps:
      - name: Download project
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Restore intraday events
        uses: actions/cache@v4
        with:
          path: |
            backend/intraday_state.json
            backend/intraday_events.json
          key: closing-review-${{ github.run_id }}
          restore-keys: |
            intraday-state-

      - name: Send closing review
        run: python closing_review.py
        